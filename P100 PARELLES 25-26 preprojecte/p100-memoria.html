<html lang="cat">
<head>
    <meta charset="utf-8">
    <title>Donar la volta a una carta</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/jquery-4.0.0.js"></script>
    <script src="js/p100-memoria.js"></script>

</head>
<body>
<header>
    <h1>Memoria cartes - DEMO</h1>
    <div id="controls">
        <label for="nivell">Tria la mida del tauler: </label>
        <select id="nivell">
            <option value="4">2x2 (4 cartes)</option>
            <option value="16">4x4 (16 cartes)</option>
            <option value="36">6x6 (36 cartes)</option>
        </select>
        <button id="btn-iniciar">Començar Joc</button>
    </div>
</header>

<div id="tauler"></div>

<footer>
    <p>Fes clic en una carta per donar-li la volta</p>
</footer>



</body>
</html>
