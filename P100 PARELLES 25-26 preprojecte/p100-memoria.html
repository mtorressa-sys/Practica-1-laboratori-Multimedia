<!DOCTYPE html>
<html lang="cat">

<head>

    <meta charset="utf-8">
    <title>JOC DE MEMÒRIA</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/jquery-4.0.0.js"></script>
    <script src="js/p100-memoria.js"></script>

</head>

<body>


    <header>
        <h1>Joc de Memòria</h1>
        
        <div id="controls-nivell">

            <label for="select-nivell">Tria el nivell: </label>

            <select id="select-nivell">
                <option value="2-2">2×2 (4 cartes)</option>
                <option value="2-4">2×4 (8 cartes)</option>
                <option value="3-4">3×4 (12 cartes)</option>
                <option value="4-4" selected>4×4 (16 cartes)</option>
            </select>

            <button id="btn-iniciar">Iniciar joc</button>

        </div>

        <div id="marcador">
            <span>Parelles trobades: <strong id="marcador-parelles">0</strong></span>
            <span>Clics fets: <strong id="marcador-clics">0</strong></span>
            <span>Clics restants: <strong id="marcador-restants">0</strong></span>
        </div>

    </header>

    <div id="tauler">
        //Les cartes es generen per JavaScript    
    </div>

    <div id="missatge-final" style="display:none;">
        <p> Has trobat totes les parelles!</p>
        <button id="btn-tornar">Torna a jugar</button>
    </div>

    <div id="missatge-derrota" style="display:none;">
        <p>Has superat el màxim de clics. Has perdut!</p>
        <button id="btn-tornar-derrota">Torna a jugar</button>
    </div>

    <footer>
        <p>Fes clic en una carta per donar-li la volta</p>
    </footer>

</body>

</html>
